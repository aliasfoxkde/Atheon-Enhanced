name: heroku-api-key
# Heroku API keys are UUIDs, so a bare UUID regex is a shotgun — it
# matches every UUID-shaped string in the codebase (request IDs, k8s
# resource IDs, etc.). Require Heroku-specific context: the env var
# assignment, the CLI flag form, or the OAuth header.
#
# RE2 (Go's regex engine) doesn't support lookahead, so the match span
# necessarily starts at the prefix, not the UUID. The Finding.Content
# reported by the scanner is the entire matching line anyway, so
# downstream consumers already see the full context; Wave 8 PR #96
# adds a Column field so the match span can be pinpointed at the
# UUID rather than the prefix, but that needs the schema work in
# core/finding.go before it can be wired through.
match: '(?:HEROKU_API_KEY|heroku_auth|heroku-api-key)\s*[=:]\s*["\x27]?[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}'
severity: high
enabled: true