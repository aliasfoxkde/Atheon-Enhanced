version: 2

before:
  hooks:
    - go mod tidy
    - go run ./bundler

builds:
  - id: atheon
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    binary: atheon
    ldflags:
      - -s -w

  - id: atheon-mcp
    env:
      - CGO_ENABLED=0
    main: ./cmd/mcp
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    binary: atheon-mcp
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "atheon-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: HoraDomu
    name: Atheon
  extra_files:
    - glob: core/patterns.bundle

brews:
  - name: atheon
    repository:
      owner: HoraDomu
      name: homebrew-atheon
      token: "{{ .Env.GH_PAT }}"
    homepage: "https://github.com/HoraDomu/Atheon"
    description: "Pattern matching engine for secrets/PII detection with MCP server support"
    license: "MIT"
    install: |
      bin.install "atheon"
      bin.install "atheon-mcp"
    test: |
      system "#{bin}/atheon", "--help"
      system "#{bin}/atheon-mcp", "--help"

scoops:
  - repository:
      owner: HoraDomu
      name: scoop-atheon
      token: "{{ .Env.GH_PAT }}"
    homepage: "https://github.com/HoraDomu/Atheon"
    description: "Pattern matching engine for secrets/PII detection with MCP server support"
    license: MIT
    persistence:
      - ".atheon"
    post_install: |
      Write-Host "Pattern detection tool installed. Run 'atheon update' to download latest patterns."
    bin:
      - atheon
      - atheon-mcp
