name: Sync stable/clean with upstream

on:
  # SCHEDULE REMOVED - syncs with upstream HoraDomu/Atheon which is FORBIDDEN
  # Only allow manual triggering
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write
  actions: read

jobs:
  sync:
    name: Sync stable/clean branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: stable/clean
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/HoraDomu/Atheon.git || true
          git fetch upstream

      - name: Merge upstream/main
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git merge upstream/main -m "Sync with upstream HoraDomu/Atheon main ($(date +%Y-%m-%d))"
          git push origin stable/clean

      - name: Validate sync completion
        run: |
          echo "Sync completed successfully"
          echo "Note: Testing skipped - HoraDomu/Atheon does not have a stable/clean branch"