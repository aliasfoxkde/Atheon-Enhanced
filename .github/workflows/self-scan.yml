name: Atheon Self-Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: read
  security-events: write
  pull-requests: read

jobs:
  self-scan:
    name: Self-Scan (${{ matrix.scan }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - scan: secrets
            categories: secrets,pii
            blocking: true
            description: "credential/PII leak detection in production source"
          - scan: code-quality
            categories: code-quality,devops,ai-detection
            blocking: false
            description: "code quality patterns in production source (informational)"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.24'
          cache: true

      - name: Build Atheon
        run: go build -v -o atheon ./cmd/atheon

      - name: Validate pattern bundle (${{ matrix.scan }})
        run: |
          COUNT=$(./atheon list | tail -1 | grep -oE '[0-9]+' | head -1)
          echo "Loaded ${COUNT} patterns"
          if [ "${COUNT}" -lt 250 ]; then
            echo "ERROR: Expected ≥250 patterns, got ${COUNT}"
            exit 1
          fi
          echo "✅ Pattern bundle OK (${COUNT} patterns)"

      - name: Scan — ${{ matrix.description }}
        id: scan
        run: |
          # Scan only non-test production source.
          # community/ YAML files contain example values that intentionally match
          # pattern regexes — exclude them from all scans.
          # Test files (*_test.go, testdata/) carry fake credentials by design.
          ./atheon --json --categories=${{ matrix.categories }} . \
            | jq '[.[] | select((
                (.file | test("_test\\.go$"))   or
                (.file | test("/testdata/"))     or
                (.file | test("^community/"))    or
                (.file | test("^\\.github/wiki/"))
              ) | not)]' > scan-${{ matrix.scan }}.json

          COUNT=$(jq 'length' scan-${{ matrix.scan }}.json)
          echo "findings=${COUNT}" >> "$GITHUB_OUTPUT"
          echo "Findings in production source: ${COUNT}"

          if [ "${COUNT}" -gt 0 ]; then
            echo ""
            echo "=== Findings ==="
            jq -r '.[] | "  [\(.pattern)] \(.file):\(.line)"' scan-${{ matrix.scan }}.json
          fi

      - name: Gate — fail on production findings
        if: matrix.blocking == true && steps.scan.outputs.findings != '0'
        run: |
          echo "❌ Found ${{ steps.scan.outputs.findings }} ${{ matrix.scan }} finding(s) in production source."
          echo "   Review scan-${{ matrix.scan }}.json for details."
          exit 1

      - name: Summary — informational findings
        if: matrix.blocking == false
        run: |
          COUNT=${{ steps.scan.outputs.findings }}
          if [ "${COUNT}" -gt 0 ]; then
            echo "ℹ️  ${COUNT} code-quality finding(s) in production source (informational, non-blocking)."
          else
            echo "✅ No code-quality findings in production source."
          fi

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: atheon-scan-${{ matrix.scan }}
          path: scan-${{ matrix.scan }}.json
          retention-days: 30
