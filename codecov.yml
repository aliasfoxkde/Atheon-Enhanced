codecov:
  require_ci_to_pass: false
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: 90%
        threshold: 2%
        if_not_found: success
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 5%
        if_not_found: success
        if_ci_failed: error

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true
  hide_project_coverage: false

flags:
  unittests:
    paths:
      - core/
      - cmd/atheon/
    carryforward: false

ignore:
  - "**/*_test.go"
  - "**/testdata/**"
  - "community/**"
  - ".github/**"
  - "docs/**"
  - "bundler/**"
  - "cmd/mcp/**"
