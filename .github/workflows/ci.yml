name: CI

# Consolidated CI: tests, lint, build, integration, coverage, quality gates.
# Replaces the previous (separate) ci.yml, comprehensive-ci.yml, and quality-assurance.yml.
# Run on every PR and push to main. Other workflows handle security and release.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: read
  statuses: read
  pull-requests: read

# Cancel in-progress runs when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Tests — multi-version Go, with coverage
  # ─────────────────────────────────────────────────────────────────────
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.21', '1.22', '1.23', '1.24']

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        # The -p 1 flag is MANDATORY: core has package-level state in init() that
        # is not safe under parallel package execution.
        run: |
          go test ./... -p 1 -timeout 15m -coverprofile=coverage.out

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//' | cut -d. -f1)
          echo "Coverage: ${COVERAGE}%"
          if [ "${COVERAGE}" -lt 70 ]; then
            echo "❌ Coverage ${COVERAGE}% is below 70% threshold"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets threshold"

  # ─────────────────────────────────────────────────────────────────────
  # Static analysis — go vet, golangci-lint, staticcheck, gofmt
  # ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.23'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2024.1
          staticcheck ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
        with:
          version: v1.64.8
          args: --timeout=5m

      - name: Format check
        # Standard idiom: fail if gofmt -l produces output (unformatted files).
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "❌ Go code is not formatted:"
            gofmt -d .
            exit 1
          fi
          echo "✅ Code is properly formatted"

  # ─────────────────────────────────────────────────────────────────────
  # Build — cross-platform binaries
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.23'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Build CLI
        run: go build -v -o atheon${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/atheon

      - name: Build MCP server
        run: go build -v -o atheon-mcp${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/mcp

      - name: Smoke test (unix)
        if: runner.os != 'Windows'
        run: |
          ./atheon --version
          ./atheon list categories

      - name: Smoke test (windows)
        if: runner.os == 'Windows'
        run: |
          .\atheon.exe --version
          .\atheon.exe list categories

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: binaries-${{ matrix.os }}
          path: |
            atheon
            atheon.exe
            atheon-mcp
            atheon-mcp.exe

  # ─────────────────────────────────────────────────────────────────────
  # Integration tests — pattern bundle, profiles, MCP server
  # ─────────────────────────────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.23'
          cache: true

      - name: Build binaries
        run: |
          go build -o atheon ./cmd/atheon
          go build -o atheon-mcp ./cmd/mcp

      - name: Validate pattern bundle
        # The bundle must contain at least 250 patterns. The exact count is
        # tracked separately by scripts/pattern-count.sh.
        run: |
          COUNT=$(./atheon list | tail -1 | grep -oE '[0-9]+' | head -1)
          echo "Pattern bundle: ${COUNT} patterns"
          if [ "${COUNT}" -lt 250 ]; then
            echo "❌ Expected ≥250 patterns, got ${COUNT}"
            exit 1
          fi

      - name: Validate configuration profiles
        run: |
          if [ -d config/profiles ] && [ -n "$(ls config/profiles/*.json 2>/dev/null)" ]; then
            for profile in config/profiles/*.json; do
              jq empty "$profile"
            done
          else
            echo "No configuration profiles found, skipping"
          fi

      - name: Test MCP server startup
        run: |
          # MCP server reads JSON-RPC from stdin; verify it can start and parse.
          timeout 5s ./atheon-mcp < /dev/null || true
          echo "MCP server started and exited cleanly"

  # ─────────────────────────────────────────────────────────────────────
  # Test result reporting — JUnit XML + Codecov
  # ─────────────────────────────────────────────────────────────────────
  report:
    name: Test Results & Coverage
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.23'
          cache: true

      - name: Run tests with JUnit output
        run: |
          go install github.com/jstemmer/go-junit-report/v2@latest
          go test ./... -p 1 -v -coverprofile=coverage.out 2>&1 | go-junit-report -set-exit-code > report.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.9.0
        if: always()
        with:
          files: report.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@ad3126e916f78f00edff4ed0317cf185271ccc2d # v5.4.2
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}