version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    binary: atheon
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "atheon-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: HoraDomu
    name: Atheon

brews:
  - name: atheon
    repository:
      owner: HoraDomu
      name: homebrew-atheon
      token: "{{ .Env.GH_PAT }}"
    homepage: "https://github.com/HoraDomu/Atheon"
    description: "One tool. All patterns. Any input."
    license: "MIT"
    install: |
      bin.install "atheon"
    test: |
      system "#{bin}/atheon", "--help"

scoops:
  - repository:
      owner: HoraDomu
      name: scoop-atheon
      token: "{{ .Env.GH_PAT }}"
    homepage: "https://github.com/HoraDomu/Atheon"
    description: "One tool. All patterns. Any input."
    license: MIT
