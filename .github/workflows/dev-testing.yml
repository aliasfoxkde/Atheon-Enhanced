name: Dev Testing (Relaxed Gates)

on:
  push:
    branches: [ dev/testing ]
  pull_request:
    branches: [ dev/testing ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  dev-tests:
    name: Dev Tests (Coverage ≥50%)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "${{ vars.GO_VERSION || '1.23' }}"
          cache: true

      - name: Run tests (verbose, no race — faster iteration)
        run: go test ./... -p 1 -v -coverprofile=coverage.out -timeout 15m 2>&1
        continue-on-error: true

      - name: Coverage check (relaxed — 50% threshold)
        run: |
          if [ ! -f coverage.out ]; then
            echo "❌ No coverage file — tests may have failed or did not run"
            exit 1
          fi
          # Float arithmetic — matches the main ci.yml coverage gate so a
          # 49.9% dev build correctly fails a 50% floor.
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Coverage: $COVERAGE%"
          if awk -v c="$COVERAGE" -v t=50 'BEGIN{exit !(c+0 < t+0)}'; then
            echo "❌ Coverage $COVERAGE% below dev threshold of 50%"
            exit 1
          fi
          echo "✅ Coverage $COVERAGE% (dev threshold: 50%)"
        shell: bash

  dev-lint:
    name: Dev Lint (Informational)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "${{ vars.GO_VERSION || '1.23' }}"
          cache: true

      - name: Go vet
        run: go vet ./...
        continue-on-error: true

      - name: golangci-lint (informational)
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.5.0
          args: --timeout=5m
        continue-on-error: true

  dev-self-scan:
    name: Dev Self-Scan (All Categories, Informational)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "${{ vars.GO_VERSION || '1.23' }}"
          cache: true

      - name: Build Atheon
        run: go build -o atheon ./cmd/atheon

      - name: Self-scan (all categories — informational only)
        run: |
          echo "=== Atheon self-scan: all categories (informational) ==="
          ./atheon --json --categories=secrets,pii,code-quality,devops,ai-detection . \
            | jq '[.[] | select((
                (.file | test("_test\\.go$"))              or
                (.file | test("/testdata/"))                or
                (.file | test("^community/"))               or
                (.file | test("^\\.github/wiki/"))          or
                (.file | test("^\\.github/ISSUE_TEMPLATE/"))
              ) | not)]' > dev-scan.json

          COUNT=$(jq 'length' dev-scan.json)
          echo "Findings in production source: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "--- Findings (informational) ---"
            jq -r '.[] | "\(.file):\(.line)  [\(.pattern)]  \(.content)"' dev-scan.json
            echo ""
            echo "ℹ️  $COUNT findings reported (informational only — not blocking on dev/testing)"
          else
            echo "✅ No findings in production source"
          fi
        continue-on-error: true

  dev-build-matrix:
    name: Dev Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "${{ vars.GO_VERSION || '1.23' }}"
          cache: true

      - name: Build binaries
        run: |
          go build -o atheon${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/atheon
          go build -o atheon-mcp${{ runner.os == 'Windows' && '.exe' || '' }} ./cmd/mcp
        continue-on-error: true

      - name: Smoke test (unix)
        if: runner.os != 'Windows'
        run: ./atheon --help && ./atheon list categories
        continue-on-error: true

      - name: Smoke test (windows)
        if: runner.os == 'Windows'
        run: .\atheon.exe --help && .\atheon.exe list categories
        shell: pwsh
        continue-on-error: true
