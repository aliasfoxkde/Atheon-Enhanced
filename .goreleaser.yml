version: 2

before:
  hooks:
    - go mod tidy
    - go run ./bundler

builds:
  - id: atheon
    env:
      - CGO_ENABLED=0
    main: ./cmd/atheon
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    binary: atheon
    flags:
      # -trimpath strips the GOPATH/GOROOT filesystem prefixes from
      # recorded paths so binaries built on different machines produce
      # identical output. Required for reproducible-builds attestation.
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

  - id: atheon-mcp
    env:
      - CGO_ENABLED=0
    main: ./cmd/mcp
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    binary: atheon-mcp
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    name_template: "atheon-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

# SBOM — generate SPDX-JSON for every release artifact. Downstream
# consumers (Sigstore, in-toto, govulncheck) parse SPDX directly. The
# file lands alongside the binaries in the GitHub release.
# NOTE: SBOM generation requires `syft` to be installed. Disabled until
# syft is available in CI. To re-enable: add `syft install` step or
# install syft in the goreleaser action environment.
# sboms:
#   - id: spdx
#     artifacts: binary
#     documents:
#       - "${artifact}.spdx.json"

release:
  github:
    owner: aliasfoxkde
    name: Atheon-Enhanced
  extra_files:
    - glob: core/patterns.bundle

# NOTE: Homebrew tap and Scoop bucket publishing intentionally disabled.
# They require dedicated tap/bucket repos that don't exist yet
# (aliasfoxkde/homebrew-Atheon-Enhanced and aliasfoxkde/scoop-Atheon-Enhanced
# both 404) and a GH_PAT secret with push access to those repos.
#
# Additionally, goreleaser v2 deprecated the singular `brews:` and `scoops:`
# blocks in favor of split homebrew_taps/homebrew_casks/scoops forms - even
# those now live behind flags that aren't on by default. To re-enable:
#   1. Create the tap/bucket repo(s)
#   2. Add GH_PAT secret with repo scope
#   3. Add the corresponding block here and verify with `goreleaser check`
