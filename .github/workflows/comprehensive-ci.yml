name: Comprehensive CI/CD

on:
  push:
    branches: [ main, 'infra/**' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: read
  security-events: write
  statuses: read
  pull-requests: read

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          languages: go
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          category: "/language:go"

  test-multi-version:
    name: Test Go ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: ['1.21', '1.22', '1.23', '1.24']

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go ${{ matrix.version }}
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ matrix.version }}
          cache: true

      - name: Run tests
        run: |
          # macOS ARM64: go test exits 1 after passing tests. Use output capture.
          if [ "${{ runner.os }}" == "macOS" ]; then
            OUTPUT=$(go test ./... -p 1 -v -timeout 15m 2>&1) || true
            echo "$OUTPUT"
            echo "$OUTPUT" | grep -q "^FAIL" && exit 1 || true
          else
            go test ./... -p 1 -v -race -coverprofile=coverage.out
          fi

      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//' | cut -d. -f1)
          echo "Coverage: $COVERAGE%"
          # Use cut -d. -f1 to truncate decimal before comparison for cross-platform compatibility
          if [ "$COVERAGE" -lt 70 ]; then
            echo "Coverage $COVERAGE% is below 70% threshold"
            exit 1
          fi
          echo "Coverage $COVERAGE% meets threshold"

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.23'
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@2024.1
          staticcheck ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6.5.2
        with:
          version: latest

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.23'
          cache: true

      - name: Build Atheon
        run: go build -o atheon ./cmd/atheon

      - name: Scan production source with Atheon
        run: |
          # community/ and test files intentionally contain pattern-matching content.
          # Only gate on findings in production source.
          ./atheon --json --categories=secrets,pii . \
            | jq '[.[] | select((
                (.file | test("_test\\.go$")) or
                (.file | test("/testdata/"))   or
                (.file | test("^community/"))  or
                (.file | test("^\\.github/wiki/"))
              ) | not)]' > security-findings.json
          COUNT=$(jq 'length' security-findings.json)
          echo "Production source findings: ${COUNT}"

      - name: Gate on production secrets findings
        run: |
          COUNT=$(jq 'length' security-findings.json)
          if [ "${COUNT}" -gt 0 ]; then
            echo "❌ Found ${COUNT} secrets/PII in production source:"
            jq -r '.[] | "  [\(.pattern)] \(.file):\(.line)"' security-findings.json
            exit 1
          fi
          echo "✅ No secrets or PII in production source."

  performance-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.23'
          cache: true

      - name: Run benchmarks
        run: go test -bench=. -benchmem -benchtime=3s ./core/ 2>&1 | tee benchmark-results.txt

  build-binaries:
    name: Build Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.23']

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Build binaries
        run: |
          go build -o atheon-${{ matrix.os }} ./cmd/atheon
          go build -o atheon-mcp-${{ matrix.os }} ./cmd/mcp

      - name: Test binaries
        run: |
          ./atheon-${{ matrix.os }} --version
          ./atheon-${{ matrix.os }} list categories

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.23'
          cache: true

      - name: Run integration tests
        run: |
          # Build binary for integration tests
          go build -o atheon ./cmd/atheon

          # Validate pattern bundle
          COUNT=$(./atheon list | tail -1 | grep -oE '[0-9]+' | head -1)
          echo "Pattern bundle: ${COUNT} patterns"
          if [ "${COUNT}" -lt 250 ]; then
            echo "ERROR: Expected ≥250 patterns, got ${COUNT}"
            exit 1
          fi

          # Test configuration profiles
          if [ -d config/profiles ] && [ -n "$(ls config/profiles/*.json 2>/dev/null)" ]; then
            for profile in config/profiles/*.json; do
              echo "Testing profile: $profile"
              jq empty "$profile"
            done
          else
            echo "No configuration profiles found, skipping profile tests"
          fi

          # Self-scan (informational — findings are expected in test files)
          ./atheon . > /dev/null || echo "Self-scan complete (findings expected in test/community files)"

      - name: Test MCP integration
        run: |
          go build -o atheon-mcp ./cmd/mcp
          # Test MCP server can start
          timeout 5s ./atheon-mcp || true

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check formatting
        run: |
          go fmt ./...
          if [ -n "$(git diff --name-only)" ]; then
            echo "Code is not formatted. Run 'go fmt ./...'"
            exit 1
          fi
          echo "Code is properly formatted"

      - name: Check for common issues
        run: |
          # Check for TODO comments in production code
          if grep -r "TODO" core/*.go | grep -v "test"; then
            echo "Warning: TODO comments found in production code"
          fi

          # Check for debug statements
          if grep -r "fmt.Debug" core/*.go | grep -v "test"; then
            echo "Warning: Debug statements found in production code"
          fi

  documentation-check:
    name: Documentation Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check documentation completeness
        run: |
          # Check that main branches are documented
          if [ ! -f docs/BRANCH_STRATEGY.md ]; then
            echo "docs/BRANCH_STRATEGY.md is missing"
            exit 1
          fi

          for branch in stable/clean main dev/full-feature; do
            if ! grep -q "$branch" docs/BRANCH_STRATEGY.md; then
              echo "Branch $branch not properly documented"
              exit 1
            fi
          done
          echo "All branches documented"

          # Check that all config profiles are documented (skip if no profiles exist)
          if [ -d config/profiles ] && [ "$(ls -A config/profiles/*.json 2>/dev/null)" ]; then
            for profile in config/profiles/*.json; do
              profile_name=$(basename "$profile" .json)
              if ! grep -q "$profile_name" docs/BRANCH_STRATEGY.md; then
                echo "Profile $profile_name not documented in BRANCH_STRATEGY.md"
                exit 1
              fi
            done
            echo "All profiles documented"
          else
            echo "No config profiles found, skipping profile documentation check"
          fi