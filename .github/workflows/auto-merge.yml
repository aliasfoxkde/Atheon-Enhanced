name: Auto Merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable Auto-Merge
    runs-on: ubuntu-latest
    # Only same-repo PRs (e.g. dependabot, owner branches). Fork PRs must
    # go through explicit human review — auto-merge should never fire on
    # untrusted contributor code without a manual approval step.
    if: >
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
    steps:
      - name: Check PR is mergeable
        id: check
        run: |
          # Wait up to 60s for required status checks to complete
          for i in $(seq 1 12); do
            state=$(gh api repos/${REPO}/pulls/${PR_NUMBER} --jq '.mergeable_state')
            echo "Attempt $i/12: mergeable_state=${state}"
            case "${state}" in
              clean|unstable)
                echo "PR is mergeable, proceeding..."
                exit 0
                ;;
              blocked)
                echo "PR is blocked by required checks or reviews, waiting..."
                ;;
              dirty|unknown)
                echo "PR has conflicts or is in an invalid state"
                exit 1
                ;;
              *)
                echo "Unexpected state: ${state}, waiting..."
                ;;
            esac
            sleep 5
          done
          echo "Timeout waiting for PR to become mergeable"
          exit 1

      - name: Enable auto-merge
        if: steps.check.outcome == 'success'
        run: |
          gh pr merge "${PR_NUMBER}" \
            --repo "${REPO}" \
            --squash \
            --delete-branch \
            --auto

  report-conflicts:
    name: Report Conflicts
    runs-on: ubuntu-latest
    if: github.event.pull_request.mergeable == false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
    steps:
      - name: Comment on conflicting PR
        run: |
          gh pr comment "${PR_NUMBER}" \
            --repo "${REPO}" \
            --body "This PR has merge conflicts. Please resolve them before merging."
