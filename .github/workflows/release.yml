name: Release

# Consolidated release workflow: tag-based GoReleaser + scheduled release
# on the 10th and 21st of each month. Replaces publish.yml and
# scheduled-release.yml.
#
# SECURITY NOTE: `workflow_dispatch.inputs.version` is operator-controlled but
# still flows through shell — pass it via `env:` (not direct `${{ inputs.x }}`
# inside a `run:` block) so an unexpected shell metacharacter is treated as
# data, not code. Coderabbit review CRIT-3 on PR #55 documented the same risk
# against the pre-consolidation scheduled-release.yml; the consolidated version
# inherits it, so the fix is applied here.

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 12 10,21 * *'  # 10th and 21st at 12:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g., v1.3.1-enhanced). Leave blank to auto-increment from last v*-enhanced tag.'
        required: false
        type: string

permissions:
  contents: write

# Cancel in-progress release runs when a new tag lands or a new dispatch
# comes in. Prevents two concurrent GoReleaser runs from racing on the
# same GitHub release (which creates duplicate releases / flaky uploads).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    # NOTE: The 'release' environment has branch protection that blocks
    # automated tag-push releases. Remove 'environment: release' if you want
    # fully automated releases. Keep it if you want manual approval gates.
    permissions:
      contents: write
    # Only run on the canonical repo. Forks with workflow_dispatch enabled
    # would otherwise try to push tags they don't own.
    if: github.repository == 'aliasfoxkde/Atheon-Enhanced'

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          # CRIT-3 fix: bind workflow_dispatch inputs to env so the value is
          # passed as a shell variable rather than being interpolated into
          # the script body via `${{ }}`.
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="${INPUT_VERSION}"
            # Strip any leading "v" the operator may have typed.
            VERSION="${VERSION#v}"
            # Strip trailing -enhanced if present (we add it below).
            VERSION="${VERSION%-enhanced}"
          else
            # Auto-increment patch from the last v*-enhanced tag.
            LAST_TAG=$(git tag --list 'v*-enhanced' --sort=-version:refname | head -1)
            [ -z "$LAST_TAG" ] && LAST_TAG="v1.0.0-enhanced"
            BASE="${LAST_TAG#v}"
            BASE="${BASE%-enhanced}"
            MAJOR=$(echo "$BASE" | cut -d. -f1)
            MINOR=$(echo "$BASE" | cut -d. -f2)
            PATCH=$(echo "$BASE" | cut -d. -f3)
            VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          # Validate: semver (digits and dots only, must start with digit).
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version: '$VERSION' (expected semver like 1.3.1)"
            exit 1
          fi
          TAG="v${VERSION}-enhanced"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Building release: ${TAG}"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '${{ vars.GO_VERSION }}'

      - name: Validate before tagging
        run: |
          set -euo pipefail

          # Build check
          go build ./...
          echo "  ✓ build passed"

          # Lint: go vet + gofmt (fast, no external tool required)
          go vet ./...
          echo "  ✓ go vet passed"

          # Check for unformatted files
          UNFMT=$(gofmt -l .)
          if [ -n "$UNFMT" ]; then
            echo "ERROR: Unformatted files found:"
            echo "$UNFMT"
            exit 1
          fi
          echo "  ✓ gofmt passed"

          # Lint: golangci-lint (comprehensive)
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.5.0
          golangci-lint run ./... || exit 1
          echo "  ✓ golangci-lint passed"

          # Integration tests (fast, no -race flag to save time)
          go test ./... -p 1 -timeout 5m
          echo "  ✓ integration tests passed"

          echo "✅ All checks passed — safe to tag"

      - name: Check tag does not already exist
        id: check_tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::error::Tag ${TAG} already exists."
            exit 1
          fi
          echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Create version tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Check release status
        env:
          TAG: ${{ steps.version.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Release tag ${TAG} pushed"
          echo "GoReleaser will automatically build and publish the release"
          echo "Check Actions tab: https://github.com/${REPO}/actions"

  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only run on the canonical repo, on tag push. The release job
    # pushes the tag, which re-triggers this workflow as a 'push' event
    # — that's how dispatch/schedule get their goreleaser run.
    if: >
      github.repository == 'aliasfoxkde/Atheon-Enhanced' &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '${{ vars.GO_VERSION }}'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: '~> 2.0'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
