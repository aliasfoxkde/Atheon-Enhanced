name: Release

# Consolidated release workflow: tag-based GoReleaser + scheduled release
# on the 10th and 21st of each month. Replaces publish.yml and
# scheduled-release.yml.

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 12 10,21 * *'  # 10th and 21st at 12:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g., 0.4.1)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.repository == 'aliasfoxkde/Atheon-Enhanced'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            # Calculate next version based on date: v0.YY.MM.DD format.
            # Cleaner than the prior `0.4.YYMMDD` format.
            DATE_VERSION="0.$(date +%y).$(date +%m).$(date +%d)"
            VERSION="${DATE_VERSION}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building release: ${VERSION}"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089de7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.23'

      - name: Validate before tagging
        run: |
          go build ./...
          # The -p 1 flag is MANDATORY for the test command.
          go test ./... -p 1 -timeout 15m
          echo "✅ All checks passed — safe to tag"

      - name: Create version tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Wait for build to start
        run: sleep 5

      - name: Check release status
        run: |
          echo "Release tag v${{ steps.version.outputs.version }} pushed"
          echo "GoReleaser will automatically build and publish the release"
          echo "Check Actions tab: https://github.com/${{ github.repository }}/actions"

  goreleaser:
    name: GoReleaser
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089de7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.23'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
