name: tf-ecs-no-secrets
category: terraform
match: aws_ecs_task_definition[^{]*\{[^}]*environment\s*\{[^}]*value\s*=\s*"(?=.*(password|secret|token|key))"
severity: medium
enabled: true
description: ECS task definition embeds secrets in environment variables. Use AWS Secrets Manager or Parameter Store instead.
