name: Publish Wiki

# Publishes .github/wiki/*.md to the GitHub Wiki tab whenever those
# files change on main. The Wiki is a separate Git repo at
# github.com/aliasfoxkde/Atheon-Enhanced.wiki.git — this workflow
# clones it, copies the updated files, and force-pushes.

on:
  push:
    branches: [ main ]
    paths:
      - '.github/wiki/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-wiki:
    name: Publish to GitHub Wiki
    runs-on: ubuntu-latest
    # Only run on the canonical repo — forks don't have write access
    # to this repo's Wiki.
    if: github.repository == 'aliasfoxkde/Atheon-Enhanced'

    steps:
      - name: Checkout repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Clone wiki repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.wiki.git" wiki-repo

      - name: Copy wiki files
        run: |
          cp .github/wiki/*.md wiki-repo/

      - name: Commit and push wiki
        run: |
          cd wiki-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are changes — idempotent on repeat runs.
          if git diff --cached --quiet; then
            echo "No wiki changes to publish"
          else
            git commit -m "sync: update wiki from .github/wiki/ ($(date -u +%Y-%m-%d))"
            git push
            echo "✅ Wiki published"
          fi
