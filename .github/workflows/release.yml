name: Release

# Consolidated release workflow: tag-based GoReleaser + scheduled release
# on the 10th and 21st of each month. Replaces publish.yml and
# scheduled-release.yml.
#
# SECURITY NOTE: `workflow_dispatch.inputs.version` is operator-controlled but
# still flows through shell — pass it via `env:` (not direct `${{ inputs.x }}`
# inside a `run:` block) so an unexpected shell metacharacter is treated as
# data, not code. Coderabbit review CRIT-3 on PR #55 documented the same risk
# against the pre-consolidation scheduled-release.yml; the consolidated version
# inherits it, so the fix is applied here.

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 12 10,21 * *'  # 10th and 21st at 12:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g., 0.4.1). Leave blank to auto-derive from date.'
        required: false
        type: string

permissions:
  contents: write

# Cancel in-progress release runs when a new tag lands or a new dispatch
# comes in. Prevents two concurrent GoReleaser runs from racing on the
# same GitHub release (which creates duplicate releases / flaky uploads).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only run on the canonical repo. Forks with workflow_dispatch enabled
    # would otherwise try to push tags they don't own.
    if: github.repository == 'aliasfoxkde/Atheon-Enhanced'

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          # CRIT-3 fix: bind workflow_dispatch inputs to env so the value is
          # passed as a shell variable rather than being interpolated into
          # the script body via `${{ }}`.
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="${INPUT_VERSION}"
          else
            # Auto-derive from date in 0.YY.MM.DD format.
            DATE_VERSION="0.$(date +%y).$(date +%m).$(date +%d)"
            VERSION="${DATE_VERSION}"
          fi
          # Strip any leading "v" the operator may have typed.
          VERSION="${VERSION#v}"
          # Validate: semver-ish (digits and dots only, must start with digit).
          if ! [[ "$VERSION" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            echo "::error::Invalid version: '$VERSION' (expected digits-and-dots like 0.4.1)"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building release: v${VERSION}"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.24'

      - name: Validate before tagging
        run: |
          go build ./...
          # The -p 1 flag is MANDATORY for the test command.
          go test ./... -p 1 -timeout 15m
          echo "✅ All checks passed — safe to tag"

      - name: Check tag does not already exist
        id: check_tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::error::Tag v${VERSION} already exists."
            exit 1
          fi
          echo "exists=false" >> "$GITHUB_OUTPUT"

      - name: Create version tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Wait for build to start
        run: sleep 5

      - name: Check release status
        env:
          VERSION: ${{ steps.version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Release tag v${VERSION} pushed"
          echo "GoReleaser will automatically build and publish the release"
          echo "Check Actions tab: https://github.com/${REPO}/actions"

  goreleaser:
    name: GoReleaser
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only run on the canonical repo, on tag push. The release job
    # pushes the tag, which re-triggers this workflow as a 'push' event
    # — that's how dispatch/schedule get their goreleaser run.
    if: >
      github.repository == 'aliasfoxkde/Atheon-Enhanced' &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.24'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
