name: PR Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Label PR
    runs-on: ubuntu-latest
    # Only same-repo PRs — fork PRs can't access labeler config
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/labeler@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v9.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          dot: true
          sync-labels: true
